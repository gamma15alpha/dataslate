services:

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c max_connections=20
    environment:
      POSTGRES_DB: dataslate
      POSTGRES_USER: dataslate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dataslate}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ../data/minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        sleep 3 &&
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-dataslate} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/dataslate-media
      "

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx512m"
      DB_URL: jdbc:postgresql://postgres:5432/dataslate
      DB_USER: dataslate
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-dataslate}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: dataslate-media
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
      - redis
      - minio-init
    ports:
      - "8080:8080"

  nginx:
    build:
      context: ..
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
