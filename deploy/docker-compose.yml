networks:
  dataslate-net:
    name: dataslate-net

services:

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c max_connections=20
    environment:
      POSTGRES_DB: dataslate
      POSTGRES_USER: dataslate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    networks:
      - dataslate-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ../data/redis:/data
    networks:
      - dataslate-net

  # Pin to a specific release tag from https://hub.docker.com/r/minio/minio/tags
  # Example: minio/minio:RELEASE.2025-04-22T22-12-26Z
  # Run on server: docker pull minio/minio:latest && docker inspect minio/minio:latest | grep -i repodigest
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dataslate}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - ../data/minio:/data
    networks:
      - dataslate-net

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 3 &&
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-dataslate} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/dataslate-media
      "
    networks:
      - dataslate-net
